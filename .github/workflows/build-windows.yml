name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Build monitor executable
        run: |
          npm run build:win:monitor
          New-Item -ItemType Directory -Force -Path dist-monitor/win
          Copy-Item dist/auction-monitor.exe dist-monitor/win/auction-monitor.exe -Force
        shell: pwsh

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DokkaebiAuction-Windows-Installer
          path: release/*.exe
